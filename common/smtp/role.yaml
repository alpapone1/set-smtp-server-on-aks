apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: smtp-operator
rules:
  - apiGroups: [""]
    resources:
      - pods
    verbs:
      - get
      - list
      - delete
  - apiGroups: ["apps"] 
    resources: 
      - deployments 
    verbs: 
      - get 
      - list 
      - patch